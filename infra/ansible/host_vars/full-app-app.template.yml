---
ansible_user: debian

# No-domain v0 keeps Cloudflare ingress off. Use Tailscale-only access until a
# public hostname, WAF baseline, and rate-limit baseline are approved.
cloudflared_enabled: false
cloudflared_tunnel_name: ""
cloudflared_tunnel_token: ""
cloudflared_ingress:
  - service: http_status:404

