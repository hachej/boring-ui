---
pg_enabled: true
pg_version: "17"
pg_database: boring_full_app
pg_app_tailscale_ip: "REPLACE_WITH_APP_VM_TAILSCALE_IP"
pg_shared_buffers: 1GB
pg_work_mem: 16MB
pg_maintenance_work_mem: 256MB
pg_effective_cache_size: 3GB
pg_max_connections: 100
pg_log_min_duration_statement: 500ms
pg_archive_mode: "on"
pg_archive_command: "pgbackrest --stanza=boring_full_app archive-push %p"
pg_archive_timeout: "60"
pgbackrest_stanza: boring_full_app
pgbackrest_retention_full: 4
pgbackrest_retention_diff: 14
# Cloudflare R2 is acceptable only if an EU jurisdiction bucket is confirmed.
# Real endpoint is account-specific, e.g. https://<account-id>.eu.r2.cloudflarestorage.com
# Keep secrets and bucket/account identifiers in vault-backed host vars, not git.
pgbackrest_s3_region: auto
pgbackrest_s3_endpoint: ""

unattended_origins_db:
  - 'origin=apt.postgresql.org'
  - 'origin=Tailscale'
