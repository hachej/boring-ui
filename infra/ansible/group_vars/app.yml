---
docker_enabled: true
# No-domain v0: keep public Cloudflare ingress disabled by default.
# Enable only in a later public-cutover inventory after hostname/WAF/rate-limit review.
cloudflared_enabled: false

# Set to the deploy webhook/app hostnames in real host vars when Cloudflare ingress is approved.
cloudflared_tunnel_name: ""
cloudflared_tunnel_token: ""
cloudflared_ingress: []

unattended_origins_app:
  - 'origin=Docker'
  - 'origin=cloudflared'
  - 'origin=Tailscale'
