---
- name: Assert pgbackrest secrets are configured
  ansible.builtin.assert:
    that:
      - pgbackrest_s3_bucket | default('') | length > 0
      - pgbackrest_s3_endpoint | default('') | length > 0
      - pgbackrest_s3_key | default('') | length > 0
      - pgbackrest_s3_secret | default('') | length > 0
      - pgbackrest_cipher_pass | default('') | length > 0
    fail_msg: pgbackrest_enabled=true requires S3-compatible repo credentials and cipher passphrase from the secret store.
  no_log: true

- name: Install pgbackrest and cron
  ansible.builtin.apt:
    name:
      - pgbackrest
      - cron
    state: present

- name: Ensure cron is running
  ansible.builtin.systemd:
    name: cron
    enabled: true
    state: started

- name: Create pgbackrest config directory
  ansible.builtin.file:
    path: /etc/pgbackrest
    state: directory
    owner: root
    group: postgres
    mode: "0750"

- name: Template pgbackrest.conf
  ansible.builtin.template:
    src: pgbackrest.conf.j2
    dest: /etc/pgbackrest/pgbackrest.conf
    owner: root
    group: postgres
    mode: "0640"
  no_log: true

- name: Check stanza
  ansible.builtin.command:
    cmd: "pgbackrest --stanza={{ pgbackrest_stanza }} check"
  become_user: postgres
  register: pgbackrest_check
  changed_when: false
  failed_when: false

- name: Create stanza when missing
  ansible.builtin.command:
    cmd: "pgbackrest --stanza={{ pgbackrest_stanza }} stanza-create"
  become_user: postgres
  when: pgbackrest_check.rc != 0

- name: Assert PostgreSQL archive settings match pgbackrest
  ansible.builtin.assert:
    that:
      - pg_archive_mode | default('off') == 'on'
      - pg_archive_command | default('') == "pgbackrest --stanza={{ pgbackrest_stanza }} archive-push %p"
      - pg_archive_timeout | default('') | string | length > 0
    fail_msg: pgbackrest_enabled=true requires the postgresql role to render archive_mode/archive_command/archive_timeout from inventory; run DB provisioning with pg_archive_* vars before enabling backups.

- name: Restart PostgreSQL to ensure WAL archiving is active
  ansible.builtin.systemd:
    name: "postgresql@{{ pg_version }}-main"
    state: restarted

- name: Verify pgbackrest after WAL archiving is active
  ansible.builtin.command:
    cmd: "pgbackrest --stanza={{ pgbackrest_stanza }} check"
  become_user: postgres
  changed_when: false

- name: Configure weekly full backup cron
  ansible.builtin.cron:
    name: pgbackrest full backup
    user: postgres
    minute: "0"
    hour: "2"
    weekday: "0"
    job: "pgbackrest --stanza={{ pgbackrest_stanza }} backup --type=full{% if healthcheck_backup_full_url | default('') | length > 0 %} && curl -fsS --retry 3 '{{ healthcheck_backup_full_url }}' > /dev/null 2>&1{% endif %}"
  no_log: "{{ (healthcheck_backup_full_url | default('') | length) > 0 }}"

- name: Configure daily differential backup cron
  ansible.builtin.cron:
    name: pgbackrest diff backup
    user: postgres
    minute: "0"
    hour: "2"
    weekday: "1-6"
    job: "pgbackrest --stanza={{ pgbackrest_stanza }} backup --type=diff{% if healthcheck_backup_diff_url | default('') | length > 0 %} && curl -fsS --retry 3 '{{ healthcheck_backup_diff_url }}' > /dev/null 2>&1{% endif %}"
  no_log: "{{ (healthcheck_backup_diff_url | default('') | length) > 0 }}"
