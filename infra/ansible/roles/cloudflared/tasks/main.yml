---
- name: Add cloudflared apt signing key
  ansible.builtin.get_url:
    url: https://pkg.cloudflare.com/cloudflare-main.gpg
    dest: /usr/share/keyrings/cloudflare-main.gpg
    mode: "0644"

- name: Add cloudflared apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared {{ ansible_facts['distribution_release'] }} main"
    filename: cloudflared
    state: present

- name: Install cloudflared
  ansible.builtin.apt:
    name: cloudflared
    state: present
    update_cache: true

- name: Create cloudflared config directory
  ansible.builtin.file:
    path: /etc/cloudflared
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Template cloudflared config
  ansible.builtin.template:
    src: config.yml.j2
    dest: /etc/cloudflared/config.yml
    owner: root
    group: root
    mode: "0640"
  notify: restart cloudflared

- name: Install cloudflared tunnel service from token
  ansible.builtin.command:
    cmd: "cloudflared service install {{ cloudflared_tunnel_token }}"
    creates: /etc/systemd/system/cloudflared.service
  when: cloudflared_tunnel_token | default('') | length > 0
  no_log: true

- name: Ensure cloudflared service is enabled
  ansible.builtin.systemd:
    name: cloudflared
    enabled: true
    state: started
  when: cloudflared_tunnel_token | default('') | length > 0
