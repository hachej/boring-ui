# Eval suite for boring.macro's seeded macro-transform skill.
#
# Goal: catch regressions where the workspace no longer exposes the skill
# file inside `.agents/skills/`, or the model stops consulting it before
# scaffolding a reusable transform artifact.
#
# Run:
#   Configure provider credentials for the model below, then:
#   pnpm --dir apps/boring-macro-v2 eval

model:
  provider: openrouter
  id: qwen/qwen3.6-plus

defaults:
  retries: 0
  timeoutMs: 120000

prompts:
  - prompt: Using the macro-transform skill, create a new reusable custom Python transform file at transforms/custom/eval_cpi_yoy.py for a year-over-year derived series for CPIAUCNS. Do not search the catalog and do not open a chart; just read the skill and write the transform file.
    expect:
      - tool: read
        params:
          path: !EvalRegex '\.agents/skills/macro-transform/SKILL\.md$'
      - tool: write
        params:
          path: !EvalRegex 'transforms/custom/eval_cpi_yoy\.py$'
          content: !EvalRegex 'def transform\(|INPUTS = 1|DESCRIPTION ='

