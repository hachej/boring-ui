# Fly.io configuration for boring-macro.
# Secrets are set via `fly secrets set` — see vault at secret/agent/app/boring-macro/prod.

app = "boring-macro"
primary_region = "cdg"

[build]
  dockerfile = "apps/boring-macro-v2/Dockerfile"

[[mounts]]
  source = "boring_macro_workspace"
  destination = "/data"

[http_service]
  internal_port = 5210
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
