# Fly.io configuration for boring full-app.
# Secrets (DATABASE_URL, AUTH_SECRET, etc.) are set via `fly secrets set`.

app = "boring-full-app"
primary_region = "cdg"

[build]
  dockerfile = "apps/full-app/Dockerfile"

[deploy]
  release_command = "node apps/full-app/dist/server/migrate.js"

[[mounts]]
  source = "workspace_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"
