# Internal-only Fly worker for sandboxed workspace filesystem + bwrap exec.
# No public http_service block on purpose. Public full-app cutover still requires BORING_WORKER_BASE_URL.

app = "boring-sandbox-worker"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"
  build-target = "worker-runtime"

[processes]
  app = "/usr/local/bin/worker-entrypoint node worker/agent-worker.js"

[env]
  BORING_WORKER_WORKSPACE_ROOT = "/data/workspaces"
  BORING_WORKER_EXEC_CONCURRENCY = "2"
  BORING_WORKER_BWRAP_NETWORK = "isolated"
  BORING_WORKER_EXEC_CPU_SECONDS = "30"
  BORING_WORKER_EXEC_FILE_SIZE_MIB = "64"
  BORING_WORKER_EXEC_MAX_PROCESSES = "512"
  BORING_WORKER_EXEC_OPEN_FILES = "256"
  BORING_WORKER_EXEC_VIRTUAL_MEMORY_MIB = "1024"
  HOST = "::"
  PORT = "3000"

[[mounts]]
  source = "worker_workspace_data"
  destination = "/data"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
