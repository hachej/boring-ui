[server]
host = "0.0.0.0"
port = 8010
# Disable Claude stream WebSocket for this sample; remove to use default (true).
include_stream = false
include_pty = true
include_approval = true
# For remote clients, replace 127.0.0.1 with your host-reachable IP.
companion_url = "http://127.0.0.1:3456"
pi_url = "http://127.0.0.1:8789"
pi_mode = "backend"
cors_origins = ["http://127.0.0.1:5176", "http://localhost:5176"]

[services.companion]
enabled = true
port = 3456
# command = ["npm", "run", "companion:service"]

[services.pi]
enabled = true
host = "0.0.0.0"
port = 8789
cors_origin = "*"
# command = ["npm", "run", "pi:service"]

[frontend]
host = "0.0.0.0"
port = 5176
vite_api_url = "http://127.0.0.1:8010"
ui_profile = "pi-lightningfs"

[deployment]
# Supported modes:
# - "core" (frontend -> boring-ui directly)
# - "edge" (frontend -> boring-sandbox edge proxy -> boring-ui)
mode = "core"
# Optional override for edge proxy base URL in edge mode.
# edge_proxy_url = "http://localhost:8080"

[ui]
# This table is serialized to app.config.js as-is.
# Example:
# branding = { name = "My IDE", logo = "M" }
# features = { controlPlaneOnboarding = false }
# panels = { defaults = { filetree = 280 } }
features = { codeSessions = true }
