services:
  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend
    environment:
      DEPLOY_MODE: core
      CONTROL_PLANE_PROVIDER: ${CONTROL_PLANE_PROVIDER:-supabase}
      CONTROL_PLANE_APP_ID: ${CONTROL_PLANE_APP_ID:-boring-ui}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      SUPABASE_DB_URL: ${SUPABASE_DB_URL:-}
      BORING_SETTINGS_KEY: ${BORING_SETTINGS_KEY:-}
      BORING_UI_SESSION_SECRET: ${BORING_UI_SESSION_SECRET:-}
    ports:
      - "${BORING_UI_BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: ${CORE_VITE_API_URL:-http://127.0.0.1:8000}
      VITE_PROXY_API_TARGET: ${CORE_VITE_PROXY_API_TARGET:-http://backend:8000}
      VITE_AGENT_RAIL_MODE: ${CORE_VITE_AGENT_RAIL_MODE:-pi}
      # VITE_GATEWAY_URL intentionally omitted in front mode; vite.config.ts
      # falls back gateway proxy routing to VITE_API_URL.
    ports:
      - "${BORING_UI_FRONTEND_PORT:-5173}:5173"
