services:
  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend
    environment:
      DEPLOY_MODE: core
      CONTROL_PLANE_PROVIDER: ${CONTROL_PLANE_PROVIDER:-supabase}
      CONTROL_PLANE_APP_ID: ${CONTROL_PLANE_APP_ID:-boring-ui}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      SUPABASE_DB_URL: ${SUPABASE_DB_URL:-}
      BORING_SETTINGS_KEY: ${BORING_SETTINGS_KEY:-}
      BORING_UI_SESSION_SECRET: ${BORING_UI_SESSION_SECRET:-}
    ports:
      - "${BORING_UI_BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: ${CORE_VITE_API_URL:-http://127.0.0.1:5173}
      VITE_PROXY_API_TARGET: ${CORE_VITE_PROXY_API_TARGET:-http://backend:8000}
      VITE_DEPLOY_MODE: core
      # Core UI profiles:
      # - pi-lightningfs (default)
      # - pi-cheerpx
      # - pi-httpfs (dev/debug)
      VITE_UI_PROFILE: ${CORE_UI_PROFILE:-pi-lightningfs}
      VITE_AGENT_RAIL_MODE: ${CORE_VITE_AGENT_RAIL_MODE:-pi}
      VITE_DATA_BACKEND: ${CORE_VITE_DATA_BACKEND:-lightningfs}
      VITE_LIGHTNINGFS_NAME: ${CORE_VITE_LIGHTNINGFS_NAME:-boring-fs}
      VITE_CHEERPX_WORKSPACE_ROOT: ${CORE_VITE_CHEERPX_WORKSPACE_ROOT:-}
      VITE_CHEERPX_PRIMARY_DISK_URL: ${CORE_VITE_CHEERPX_PRIMARY_DISK_URL:-}
      VITE_CHEERPX_OVERLAY_NAME: ${CORE_VITE_CHEERPX_OVERLAY_NAME:-}
      VITE_CHEERPX_ESM_URL: ${CORE_VITE_CHEERPX_ESM_URL:-}
      VITE_CONTROL_PLANE_ONBOARDING: ${CORE_VITE_CONTROL_PLANE_ONBOARDING:-false}
    ports:
      - "${BORING_UI_FRONTEND_PORT:-5173}:5173"
