services:
  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend
    container_name: boring-ui-backend
    environment:
      DEPLOY_MODE: core
    ports:
      - "${BORING_UI_BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend-core:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
    container_name: boring-ui-frontend-core
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: ${CORE_VITE_API_URL:-http://backend:8000}
    ports:
      - "${BORING_UI_FRONTEND_PORT:-5173}:5173"

  edge-proxy:
    image: nginx:1.27-alpine
    container_name: boring-ui-edge-proxy
    profiles: ["sandbox-proxy"]
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./nginx.sandbox-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${BORING_UI_SANDBOX_PROXY_PORT:-8080}:8080"

  frontend-sandbox-proxy:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
    container_name: boring-ui-frontend-sandbox-proxy
    profiles: ["sandbox-proxy"]
    environment:
      VITE_API_URL: ${SANDBOX_VITE_API_URL:-http://edge-proxy:8080}
      VITE_GATEWAY_URL: ${SANDBOX_VITE_GATEWAY_URL:-http://edge-proxy:8080}
    ports:
      - "${BORING_UI_FRONTEND_PROXY_PORT:-5174}:5173"
