# Legacy convenience compose file.
# Canonical mode entrypoints are:
# - deploy/docker/docker-compose.front.yml (core)
# - deploy/docker/docker-compose.sandbox.yml (edge)
# This file remains as an all-in-one local helper only.
services:
  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend
    container_name: boring-ui-backend
    environment:
      DEPLOY_MODE: core
      CONTROL_PLANE_PROVIDER: ${CONTROL_PLANE_PROVIDER:-supabase}
      CONTROL_PLANE_APP_ID: ${CONTROL_PLANE_APP_ID:-boring-ui}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      SUPABASE_DB_URL: ${SUPABASE_DB_URL:-}
      BORING_SETTINGS_KEY: ${BORING_SETTINGS_KEY:-}
      BORING_UI_SESSION_SECRET: ${BORING_UI_SESSION_SECRET:-}
    ports:
      - "${BORING_UI_BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend-core:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
    container_name: boring-ui-frontend-core
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: ${CORE_VITE_API_URL:-http://127.0.0.1:5173}
      VITE_PROXY_API_TARGET: ${CORE_VITE_PROXY_API_TARGET:-http://backend:8000}
      VITE_DEPLOY_MODE: core
      VITE_UI_PROFILE: ${CORE_UI_PROFILE:-pi-lightningfs}
    ports:
      - "${BORING_UI_FRONTEND_PORT:-5173}:5173"

  edge-proxy:
    image: nginx:1.27-alpine
    container_name: boring-ui-edge-proxy
    profiles: ["edge"]
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./nginx.sandbox-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${BORING_UI_EDGE_PROXY_PORT:-8080}:8080"

  frontend-edge:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
    container_name: boring-ui-frontend-edge
    profiles: ["edge"]
    environment:
      VITE_API_URL: ${EDGE_VITE_API_URL:-http://127.0.0.1:5174}
      VITE_PROXY_API_TARGET: ${EDGE_VITE_PROXY_API_TARGET:-http://edge-proxy:8080}
      VITE_DEPLOY_MODE: edge
      VITE_UI_PROFILE: ${EDGE_UI_PROFILE:-companion-httpfs}
    ports:
      - "${BORING_UI_EDGE_FRONTEND_PORT:-5174}:5173"
