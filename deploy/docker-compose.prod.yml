services:
  backend:
    image: ${BORING_UI_IMAGE:-boring-ui:latest}
    env_file:
      - ${BUI_BACKEND_ENV_FILE:-/dev/null}
    environment:
      BUI_APP_TOML: /app/boring.app.toml
      BORING_UI_STATIC_DIR: /app/dist
      BORING_UI_WORKSPACE_ROOT: /data/workspaces
      BUI_AGENTS_MODE: backend
      SANDBOX_BACKEND: nsjail
      CONTROL_PLANE_ENABLED: ${CONTROL_PLANE_ENABLED:-false}
      CONTROL_PLANE_PROVIDER: ${CONTROL_PLANE_PROVIDER:-neon}
      CONTROL_PLANE_APP_ID: ${CONTROL_PLANE_APP_ID:-boring-ui}
      AUTH_SESSION_SECURE_COOKIE: "true"
    cap_add:
      - SYS_ADMIN
      - SYS_CHROOT
      - SETUID
      - SETGID
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
    volumes:
      - ${BORING_UI_WORKSPACES_HOST_PATH:-/data/workspaces}:/data/workspaces
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  caddy:
    image: caddy:2.10.2-alpine
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BUI_HOSTNAME: ${BUI_HOSTNAME:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${BUI_CADDYFILE:-./python/Caddyfile.prod}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --header=\"Host: ${BUI_HOSTNAME:-localhost}\" http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
