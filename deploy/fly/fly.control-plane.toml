# Fly.io config for boring-ui control plane (backend-agent mode).
# This Machine runs always-on, handles auth, workspace CRUD, and fly-replay routing.
# Workspace Machines are created via the Fly Machines API, not fly deploy.

app = "boring-cp"
primary_region = "cdg"

[build]
  dockerfile = "deploy/shared/Dockerfile.backend"

[env]
  AGENTS_MODE = "backend"
  CONTROL_PLANE_PROVIDER = "neon"
  CONTROL_PLANE_APP_ID = "boring-ui"
  AUTH_SESSION_SECURE_COOKIE = "true"
  # DATABASE_URL, BORING_SESSION_SECRET, FLY_API_TOKEN etc. set via fly secrets

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
