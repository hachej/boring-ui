app = "boring-ui-backend-agent"
primary_region = "cdg"

[build]
  dockerfile = "../shared/Dockerfile.ts-backend"

[deploy]
  # Backend-agent serves hashed Vite bundles from the same app process.
  # Avoid mixed old/new machine pools during rollout, which can pair stale
  # index.html with a different asset set and trigger MIME/module failures.
  strategy = "immediate"

[env]
  APP_ENV = "production"
  NODE_ENV = "production"
  AGENTS_MODE = "backend"
  BUI_AGENTS_MODE = "backend"
  AUTH_DEV_AUTO_LOGIN = "false"
  AUTH_DEV_LOGIN_ENABLED = "false"
  CONTROL_PLANE_PROVIDER = "neon"
  CONTROL_PLANE_APP_ID = "boring-ui"
  AUTH_SESSION_SECURE_COOKIE = "true"
  BUI_APP_TOML = "/app/boring.app.toml"
  DEPLOY_MODE = "core"

[http_service]
  internal_port = 8000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
