name: Post Deploy Smoke

on:
  workflow_dispatch:
    inputs:
      deploy_url:
        description: "Deployed app URL (for example: https://boring-full-app.fly.dev)"
        required: true
        type: string
  repository_dispatch:
    types: [post-deploy-smoke]

permissions:
  contents: read

jobs:
  smoke:
    name: Run post-deploy smoke
    runs-on: ubuntu-latest
    env:
      DEPLOY_URL: ${{ inputs.deploy_url || github.event.client_payload.deploy_url }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
      AGENTMAIL_INBOX_ID: ${{ vars.AGENTMAIL_INBOX_ID }}
      AGENTMAIL_EMAIL: ${{ vars.AGENTMAIL_EMAIL }}
      SMOKE_EMAIL_DOMAIN: ${{ vars.SMOKE_EMAIL_DOMAIN }}
      SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
    steps:
      - name: Validate inputs
        run: |
          if [ -z "${DEPLOY_URL}" ]; then
            echo "DEPLOY_URL is required"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run post-deploy smoke
        run: pnpm --filter full-app smoke:post-deploy
