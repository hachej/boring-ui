name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_ACCESS_TOKEN: ${{ secrets.FLY_ACCESS_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BORING_UI_SESSION_SECRET: ${{ secrets.BORING_UI_SESSION_SECRET }}
      BORING_SETTINGS_KEY: ${{ secrets.BORING_SETTINGS_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      GITHUB_APP_ID: ${{ secrets.BUI_GITHUB_APP_ID }}
      GITHUB_APP_CLIENT_ID: ${{ secrets.BUI_GITHUB_APP_CLIENT_ID }}
      GITHUB_APP_CLIENT_SECRET: ${{ secrets.BUI_GITHUB_APP_CLIENT_SECRET }}
      GITHUB_APP_PRIVATE_KEY: ${{ secrets.BUI_GITHUB_APP_PRIVATE_KEY }}
      GITHUB_APP_SLUG: ${{ secrets.BUI_GITHUB_APP_SLUG }}
      NEON_AUTH_BASE_URL: ${{ secrets.NEON_AUTH_BASE_URL }}
      NEON_AUTH_JWKS_URL: ${{ secrets.NEON_AUTH_JWKS_URL }}
      GHCR_USERNAME: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUI_DEPLOY_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.0'
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Fly CLI
        run: |
          curl -fsSL https://fly.io/install.sh | sh
          ln -sf "$HOME/.fly/bin/flyctl" "$HOME/.fly/bin/fly"
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"

      - name: Set Fly secrets
        run: bash deploy/fly/fly.secrets.sh boring-ui-backend-agent

      - name: Deploy backend-agent app
        run: fly deploy --remote-only -c deploy/fly/fly.backend-agent.toml

      - name: Sync workspace image ref
        run: |
          APP_IMAGE="$(fly status -a boring-ui-backend-agent | sed -n 's/^  Image    = //p' | head -n1 | tr -d '[:space:]')"
          if [ -z "$APP_IMAGE" ]; then
            echo "Failed to resolve deployed backend image" >&2
            exit 1
          fi
          IMAGE_REF="registry.fly.io/${APP_IMAGE}"
          echo "Setting FLY_IMAGE_REF=${IMAGE_REF}"
          fly secrets set --app boring-ui-backend-agent FLY_IMAGE_REF="${IMAGE_REF}"

      - name: Health check
        run: |
          for _ in $(seq 1 20); do
            if curl --fail --show-error --silent "https://boring-ui-backend-agent.fly.dev/healthz" >/tmp/healthz.json; then
              cat /tmp/healthz.json
              exit 0
            fi
            sleep 5
          done
          exit 1
