name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_ACCESS_TOKEN: ${{ secrets.FLY_ACCESS_TOKEN }}
      GHCR_USERNAME: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUI_DEPLOY_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.0'
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Vault CLI
        run: |
          curl -fsSLo /tmp/vault.zip https://releases.hashicorp.com/vault/1.18.3/vault_1.18.3_linux_amd64.zip
          unzip -o /tmp/vault.zip -d /tmp
          sudo install /tmp/vault /usr/local/bin/vault

      - name: Install Fly CLI
        run: |
          curl -fsSL https://fly.io/install.sh | sh
          ln -sf "$HOME/.fly/bin/flyctl" "$HOME/.fly/bin/fly"
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"

      - name: Set Fly secrets
        run: bash deploy/fly/fly.secrets.sh boring-ui-backend-agent

      - name: Deploy backend-agent app
        run: fly deploy --remote-only -c deploy/fly/fly.backend-agent.toml

      - name: Health check
        run: |
          for _ in $(seq 1 20); do
            if curl --fail --show-error --silent "https://boring-ui-backend-agent.fly.dev/healthz" >/tmp/healthz.json; then
              cat /tmp/healthz.json
              exit 0
            fi
            sleep 5
          done
          exit 1
