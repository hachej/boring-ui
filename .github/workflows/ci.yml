name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CI: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Run lint
        run: pnpm lint
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm typecheck
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  bundle-budget:
    name: Bundle Budget
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm --filter @hachej/boring-ui-kit build && pnpm --filter @hachej/boring-agent build

      - name: Build workspace package
        run: pnpm --filter @hachej/boring-workspace run build

      - name: Enforce bundle budgets
        env:
          BUNDLE_INITIAL_BUDGET_KB: "800"
          BUNDLE_TOTAL_BUDGET_KB: "800"
          BUNDLE_TARGET_INITIAL_KB: "150"
          BUNDLE_TARGET_TOTAL_KB: "800"
        run: pnpm check:bundle-size

  core-bundle-budget:
    name: Core Bundle Budget
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build core package
        run: pnpm --filter @hachej/boring-core run build || true

      - name: Enforce core bundle budgets
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: pnpm --filter @hachej/boring-core run check:bundle-size

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ubuntu
          POSTGRES_PASSWORD: test
          POSTGRES_DB: boring_ui_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install system dependencies
        run: sudo apt-get install -y ripgrep

      - name: Build UI package
        run: pnpm --filter @hachej/boring-ui-kit build

      - name: Build core package
        run: pnpm --filter @hachej/boring-core build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build agent package
        run: pnpm --filter @hachej/boring-agent build

      - name: Build workspace package
        run: pnpm --filter @hachej/boring-workspace build

      - name: Run vitest suite
        run: pnpm test
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  invariants:
    name: Invariants
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Run invariants
        run: pnpm lint:invariants

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e
        run: pnpm e2e

  deploy:
    name: Deploy to Fly.io
    needs: [lint, typecheck, unit, invariants, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy boring-full-app
        run: flyctl deploy --remote-only --app boring-full-app --config apps/full-app/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy boring-macro
        run: flyctl deploy --remote-only --app boring-macro --config apps/boring-macro-v2/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
