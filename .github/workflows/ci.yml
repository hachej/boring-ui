name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CI: true

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm typecheck:changed
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          TYPECHECK_BASE_REF: ${{ github.base_ref || 'main' }}

  bundle-budget:
    name: Bundle Budget
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build workspace package and enforce bundle budgets
        env:
          BUNDLE_INITIAL_BUDGET_KB: "800"
          BUNDLE_TOTAL_BUDGET_KB: "800"
          BUNDLE_TARGET_INITIAL_KB: "150"
          BUNDLE_TARGET_TOTAL_KB: "800"
        run: pnpm ci:bundle-size

  core-bundle-budget:
    name: Core Bundle Budget
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build core package and enforce bundle budgets
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: pnpm ci:core-bundle-size

  unit:
    name: Unit Tests (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent
            command: pnpm --filter @hachej/boring-agent... --workspace-concurrency=4 run build && pnpm --filter @hachej/boring-agent run test
          - name: workspace-1
            command: pnpm --filter @hachej/boring-workspace... --workspace-concurrency=4 run build && pnpm --filter @hachej/boring-workspace exec vitest run --shard=1/2
          - name: workspace-2
            command: pnpm --filter @hachej/boring-workspace... --workspace-concurrency=4 run build && pnpm --filter @hachej/boring-workspace exec vitest run --shard=2/2
          - name: core-1
            command: pnpm --filter @hachej/boring-core... --workspace-concurrency=4 run build && pnpm --filter @hachej/boring-core exec vitest run --no-file-parallelism --shard=1/3
          - name: core-2
            command: pnpm --filter @hachej/boring-core... --workspace-concurrency=4 run build && pnpm --filter @hachej/boring-core exec vitest run --no-file-parallelism --shard=2/3
          - name: core-3
            command: pnpm --filter @hachej/boring-core... --workspace-concurrency=4 run build && pnpm --filter @hachej/boring-core exec vitest run --no-file-parallelism --shard=3/3
          - name: rest-cli
            command: pnpm -r --filter @hachej/boring-core... --filter @hachej/boring-ui-cli... --workspace-concurrency=4 run build && pnpm -r --filter @hachej/boring-ui-kit --filter @hachej/boring-ui-plugin-cli --filter @hachej/boring-ui-cli --workspace-concurrency=4 run test
          - name: rest-plugins
            command: pnpm -r --filter @hachej/boring-ask-user... --filter @hachej/boring-data-catalog... --filter @hachej/boring-deck... --workspace-concurrency=4 run build && pnpm -r --filter @hachej/boring-ask-user --filter @hachej/boring-data-explorer --filter @hachej/boring-data-catalog --filter @hachej/boring-deck --workspace-concurrency=4 run test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ubuntu
          POSTGRES_PASSWORD: test
          POSTGRES_DB: boring_ui_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install system dependencies
        run: sudo apt-get install -y ripgrep

      - name: Run vitest shard
        run: ${{ matrix.command }}
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  unit-summary:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: unit
    if: always()
    steps:
      - name: Verify unit test shards
        run: |
          if [ "${{ needs.unit.result }}" != "success" ]; then
            echo "Unit test shards result: ${{ needs.unit.result }}"
            exit 1
          fi
          echo "All unit test shards passed."

  invariants:
    name: Invariants
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Run invariants
        run: pnpm lint:invariants

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e
        run: pnpm e2e

  publish-ci:
    name: Publish CI packages to npm
    needs: [lint, typecheck, bundle-budget, core-bundle-budget, unit-summary, invariants, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Set unique CI package version
        id: version
        run: node scripts/set-ci-package-version.mjs

      - name: Build publishable packages
        run: |
          pnpm --filter @hachej/boring-ui-kit build
          pnpm --filter @hachej/boring-agent build
          pnpm --filter @hachej/boring-ui-plugin-cli build
          pnpm --filter @hachej/boring-workspace build
          pnpm --filter @hachej/boring-core build
          pnpm --filter @hachej/boring-deck build
          pnpm --filter @hachej/boring-ui-cli build:full
          pnpm --filter @hachej/boring-ask-user build
          pnpm --filter @hachej/boring-data-explorer build
          pnpm --filter @hachej/boring-data-catalog build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Publish packages with ci dist-tag
        run: |
          for pkg in packages/ui packages/agent packages/plugin-cli packages/workspace packages/core packages/cli plugins/deck plugins/ask-user plugins/data-explorer plugins/data-catalog; do
            tarball=$(cd $pkg && pnpm pack 2>&1 | tail -1)
            if ! npm publish "$pkg/$tarball" --access public --tag ci --provenance; then
              echo "::warning::CI package publish failed for $pkg; continuing because release publishing is handled by release.yml"
            fi
          done

  deploy-dev:
    name: Deploy full-app dev to Fly.io
    needs: [lint, typecheck, unit-summary, invariants, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1

      - name: Deploy boring-full-app-dev
        run: flyctl deploy --remote-only --app boring-full-app-dev --config apps/full-app/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Prod full-app deploys from release.yml on published GitHub releases.
      # boring-macro is deployed from its canonical standalone repository:
      # https://github.com/hachej/boring-macro
      # Do not deploy it from this monorepo.
