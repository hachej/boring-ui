name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CI: true

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      workspace_bundle: ${{ steps.filter.outputs.workspace_bundle }}
      core_bundle: ${{ steps.filter.outputs.core_bundle }}
      e2e: ${{ steps.filter.outputs.e2e }}
      ui_review: ${{ steps.filter.outputs.ui_review }}
      worker_smoke: ${{ steps.filter.outputs.worker_smoke }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}" || true
            files=$(git diff --name-only "$base...HEAD" || git diff --name-only "$base" HEAD || true)
          else
            files=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" || true)
          fi

          workspace_bundle=false
          core_bundle=false
          e2e=false
          ui_review=false
          worker_smoke=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              pnpm-lock.yaml|package.json|pnpm-workspace.yaml|.github/workflows/ci.yml|packages/workspace/*|packages/workspace/**|packages/ui/*|packages/ui/**|plugins/*/src/*.tsx|plugins/*/src/**/*.tsx|apps/workspace-playground/*|apps/workspace-playground/**)
                workspace_bundle=true
                ;;
            esac
            case "$file" in
              pnpm-lock.yaml|package.json|pnpm-workspace.yaml|.github/workflows/ci.yml|packages/core/*|packages/core/**)
                core_bundle=true
                ;;
            esac
            case "$file" in
              pnpm-lock.yaml|package.json|pnpm-workspace.yaml|.github/workflows/ci.yml|packages/agent/*|packages/agent/**|packages/workspace/*|packages/workspace/**|packages/core/*|packages/core/**|apps/full-app/*|apps/full-app/**|apps/workspace-playground/*|apps/workspace-playground/**|**/playwright.config.ts)
                e2e=true
                ;;
            esac
            case "$file" in
              pnpm-lock.yaml|package.json|pnpm-workspace.yaml|.github/workflows/ci.yml|.impeccable.md|.agents/skills/ui/*|.agents/skills/ui/**|tools/ui-review/*|tools/ui-review/**|packages/ui/*|packages/ui/**|packages/workspace/*|packages/workspace/**|packages/core/src/front/*|packages/core/src/front/**|packages/core/src/app/front/*|packages/core/src/app/front/**|apps/*/src/front/*|apps/*/src/front/**|plugins/*/src/*.tsx|plugins/*/src/**/*.tsx|**/*.css)
                ui_review=true
                ;;
            esac
            case "$file" in
              pnpm-lock.yaml|package.json|pnpm-workspace.yaml|.github/workflows/ci.yml|apps/full-app/Dockerfile|apps/full-app/src/server/*|apps/full-app/src/server/**|apps/full-app/scripts/remote-worker-smoke.mjs|packages/agent/*|packages/agent/**|packages/core/src/server/*|packages/core/src/server/**)
                worker_smoke=true
                ;;
            esac
          done <<< "$files"

          echo "workspace_bundle=$workspace_bundle" >> "$GITHUB_OUTPUT"
          echo "core_bundle=$core_bundle" >> "$GITHUB_OUTPUT"
          echo "e2e=$e2e" >> "$GITHUB_OUTPUT"
          echo "ui_review=$ui_review" >> "$GITHUB_OUTPUT"
          echo "worker_smoke=$worker_smoke" >> "$GITHUB_OUTPUT"

  action-pins:
    name: Action Pins
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Assert workflow actions are pinned to commit SHAs
        run: bash scripts/check-action-pins.sh

  dependency-age:
    name: Dependency Age
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Check direct dependency publish age
        run: node scripts/check-dependency-age.mjs --base "origin/${{ github.base_ref }}" --min-age-days 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && \
             [ "${{ contains(github.event.pull_request.labels.*.name, 'ci:full') }}" != "true" ] && \
             [ "${{ contains(github.event.pull_request.labels.*.name, 'release-candidate') }}" != "true" ] && \
             [[ ! "${{ github.head_ref }}" == release/* ]]; then
            pnpm typecheck:changed
          else
            pnpm typecheck
          fi
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          TYPECHECK_BASE_REF: ${{ github.base_ref || 'main' }}

  bundle-budget:
    name: Bundle Budget
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.workspace_bundle == 'true' || contains(github.event.pull_request.labels.*.name, 'ci:full') || contains(github.event.pull_request.labels.*.name, 'release-candidate') || startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build workspace package and enforce bundle budgets
        env:
          BUNDLE_INITIAL_BUDGET_KB: "800"
          BUNDLE_TOTAL_BUDGET_KB: "800"
          BUNDLE_TARGET_INITIAL_KB: "150"
          BUNDLE_TARGET_TOTAL_KB: "800"
        run: pnpm ci:bundle-size

  core-bundle-budget:
    name: Core Bundle Budget
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.core_bundle == 'true' || contains(github.event.pull_request.labels.*.name, 'ci:full') || contains(github.event.pull_request.labels.*.name, 'release-candidate') || startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build core package and enforce bundle budgets
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: pnpm ci:core-bundle-size

  unit-changed:
    name: Unit Tests Changed
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'ci:full') && !contains(github.event.pull_request.labels.*.name, 'release-candidate') && !startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ubuntu
          POSTGRES_PASSWORD: test
          POSTGRES_DB: boring_ui_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install system dependencies
        run: sudo apt-get install -y bubblewrap ripgrep

      - name: Prepare bwrap user namespaces
        run: |
          sudo sysctl -w kernel.unprivileged_userns_clone=1 || true
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0 || true
          tmp=$(mktemp -d)
          bwrap \
            --unshare-all \
            --die-with-parent \
            --new-session \
            --tmpfs / \
            --proc /proc \
            --dev /dev \
            --tmpfs /tmp \
            --ro-bind /usr /usr \
            --ro-bind /lib /lib \
            --ro-bind /lib64 /lib64 \
            --ro-bind /bin /bin \
            --ro-bind /sbin /sbin \
            --ro-bind /etc /etc \
            --bind "$tmp" /workspace \
            --chdir /workspace \
            --setenv HOME /workspace \
            -- bash -c 'echo bwrap-ok > out.txt'
          test "$(cat "$tmp/out.txt")" = bwrap-ok

      - name: Run affected unit tests
        run: pnpm test:changed
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          TEST_BASE_REF: ${{ github.base_ref || 'main' }}

  unit-full:
    name: Unit Tests Full (${{ matrix.name }})
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'ci:full') || contains(github.event.pull_request.labels.*.name, 'release-candidate') || startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent
            command: pnpm --filter @hachej/boring-agent... --workspace-concurrency=4 run build && pnpm --filter @hachej/boring-agent run test
          - name: workspace-1
            command: pnpm --filter @hachej/boring-workspace... --workspace-concurrency=4 run build && pnpm --filter @hachej/boring-workspace exec vitest run --shard=1/2
          - name: workspace-2
            command: pnpm --filter @hachej/boring-workspace... --workspace-concurrency=4 run build && pnpm --filter @hachej/boring-workspace exec vitest run --shard=2/2
          - name: core-1
            command: pnpm --filter @hachej/boring-core... --workspace-concurrency=4 run build && pnpm --filter @hachej/boring-core exec vitest run --no-file-parallelism --shard=1/3
          - name: core-2
            command: pnpm --filter @hachej/boring-core... --workspace-concurrency=4 run build && pnpm --filter @hachej/boring-core exec vitest run --no-file-parallelism --shard=2/3
          - name: core-3
            command: pnpm --filter @hachej/boring-core... --workspace-concurrency=4 run build && pnpm --filter @hachej/boring-core exec vitest run --no-file-parallelism --shard=3/3
          - name: rest-cli
            command: pnpm -r --filter @hachej/boring-core... --filter @hachej/boring-ui-cli... --workspace-concurrency=4 run build && pnpm -r --filter @hachej/boring-ui-kit --filter @hachej/boring-ui-plugin-cli --filter @hachej/boring-ui-cli --workspace-concurrency=4 run test
          - name: rest-plugins
            command: pnpm -r --filter @hachej/boring-ask-user... --filter @hachej/boring-data-catalog... --filter @hachej/boring-deck... --filter @hachej/boring-generated-pane... --filter @hachej/boring-data-bridge... --filter @hachej/boring-bi-dashboard... --workspace-concurrency=4 run build && pnpm -r --filter @hachej/boring-ask-user --filter @hachej/boring-data-explorer --filter @hachej/boring-data-catalog --filter @hachej/boring-deck --filter @hachej/boring-generated-pane --filter @hachej/boring-data-bridge --filter @hachej/boring-bi-dashboard --workspace-concurrency=4 run test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ubuntu
          POSTGRES_PASSWORD: test
          POSTGRES_DB: boring_ui_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install system dependencies
        run: sudo apt-get install -y bubblewrap ripgrep

      - name: Prepare bwrap user namespaces
        run: |
          sudo sysctl -w kernel.unprivileged_userns_clone=1 || true
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0 || true
          tmp=$(mktemp -d)
          bwrap \
            --unshare-all \
            --die-with-parent \
            --new-session \
            --tmpfs / \
            --proc /proc \
            --dev /dev \
            --tmpfs /tmp \
            --ro-bind /usr /usr \
            --ro-bind /lib /lib \
            --ro-bind /lib64 /lib64 \
            --ro-bind /bin /bin \
            --ro-bind /sbin /sbin \
            --ro-bind /etc /etc \
            --bind "$tmp" /workspace \
            --chdir /workspace \
            --setenv HOME /workspace \
            -- bash -c 'echo bwrap-ok > out.txt'
          test "$(cat "$tmp/out.txt")" = bwrap-ok

      - name: Run vitest shard
        run: ${{ matrix.command }}
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  unit-summary:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [unit-changed, unit-full]
    if: always()
    steps:
      - name: Verify unit test jobs
        run: |
          changed="${{ needs.unit-changed.result }}"
          full="${{ needs.unit-full.result }}"
          if [ "$changed" != "success" ] && [ "$changed" != "skipped" ]; then
            echo "Changed unit tests result: $changed"
            exit 1
          fi
          if [ "$full" != "success" ] && [ "$full" != "skipped" ]; then
            echo "Full unit tests result: $full"
            exit 1
          fi
          if [ "$changed" = "skipped" ] && [ "$full" = "skipped" ]; then
            echo "No unit test job ran. Check CI routing."
            exit 1
          fi
          echo "Unit test routing passed: changed=$changed full=$full"

  invariants:
    name: Invariants
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Run invariants
        run: pnpm lint:invariants

  e2e:
    name: E2E
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.e2e == 'true' || contains(github.event.pull_request.labels.*.name, 'ci:e2e') || contains(github.event.pull_request.labels.*.name, 'ci:full') || contains(github.event.pull_request.labels.*.name, 'release-candidate') || startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e
        run: pnpm e2e

  ui-review-fixture:
    name: UI Review
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.ui_review == 'true' || contains(github.event.pull_request.labels.*.name, 'ci:visual') || contains(github.event.pull_request.labels.*.name, 'ci:e2e') || contains(github.event.pull_request.labels.*.name, 'ci:full') || contains(github.event.pull_request.labels.*.name, 'release-candidate') || startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install system dependencies
        run: sudo apt-get install -y bubblewrap ripgrep

      - name: Prepare bwrap user namespaces
        run: |
          sudo sysctl -w kernel.unprivileged_userns_clone=1 || true
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0 || true
          tmp=$(mktemp -d)
          bwrap \
            --unshare-all \
            --die-with-parent \
            --new-session \
            --tmpfs / \
            --proc /proc \
            --dev /dev \
            --tmpfs /tmp \
            --ro-bind /usr /usr \
            --ro-bind /lib /lib \
            --ro-bind /lib64 /lib64 \
            --ro-bind /bin /bin \
            --ro-bind /sbin /sbin \
            --ro-bind /etc /etc \
            --bind "$tmp" /workspace \
            --chdir /workspace \
            --setenv HOME /workspace \
            -- bash -c 'echo bwrap-ok > out.txt'
          test "$(cat "$tmp/out.txt")" = bwrap-ok

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run credential-free UI review and bounded Bombadil exploration
        timeout-minutes: 15
        run: pnpm --filter @hachej/boring-ui-review-tools ui:review:ci

      - name: Run deterministic component visual baselines
        timeout-minutes: 15
        run: pnpm --filter @hachej/boring-ui-review-tools ui:review:components:ci

      - name: Upload UI review artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ui-review-artifacts
          path: |
            e2e-artifacts/ui-review
            e2e-artifacts/ui-review-components
          if-no-files-found: error

  remote-worker-smoke:
    name: Remote Worker Smoke
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.worker_smoke == 'true' || contains(github.event.pull_request.labels.*.name, 'ci:worker-smoke') || contains(github.event.pull_request.labels.*.name, 'ci:full') || contains(github.event.pull_request.labels.*.name, 'release-candidate') || startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install worker smoke system dependencies
        run: sudo apt-get install -y bubblewrap ripgrep

      - name: Prepare bwrap user namespaces
        run: |
          sudo sysctl -w kernel.unprivileged_userns_clone=1 || true
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0 || true
          tmp=$(mktemp -d)
          bwrap \
            --unshare-all \
            --die-with-parent \
            --new-session \
            --tmpfs / \
            --proc /proc \
            --dev /dev \
            --tmpfs /tmp \
            --ro-bind /usr /usr \
            --ro-bind /lib /lib \
            --ro-bind /lib64 /lib64 \
            --ro-bind /bin /bin \
            --ro-bind /sbin /sbin \
            --ro-bind /etc /etc \
            --bind "$tmp" /workspace \
            --chdir /workspace \
            --setenv HOME /workspace \
            -- bash -c 'echo bwrap-ok > out.txt'
          test "$(cat "$tmp/out.txt")" = bwrap-ok

      - name: Build full-app image inputs
        run: pnpm --filter full-app run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build worker Docker target
        run: docker build -f apps/full-app/Dockerfile --target worker-runtime -t boring-sandbox-worker:ci .

      - name: Verify worker image runtime dependencies
        run: |
          docker run --rm --entrypoint sh boring-sandbox-worker:ci -lc '
            command -v bwrap >/dev/null
            command -v python3 >/dev/null
            command -v rg >/dev/null
            command -v setpriv >/dev/null
            command -v uv >/dev/null
            python3 -m venv /tmp/worker-smoke-venv
            uv --version >/dev/null
            node -e "import(\"./packages/agent/dist/server/worker/index.js\")"
            test ! -e /app/apps/full-app
            test ! -e /app/apps
          '

      - name: Run remote-worker smoke
        run: pnpm --filter full-app run smoke:remote-worker

  pr-fast-summary:
    name: PR Fast Summary
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [action-pins, lint, typecheck, unit-summary, invariants, bundle-budget, core-bundle-budget, e2e, remote-worker-smoke]
    steps:
      - name: Verify PR checks
        run: |
          for result in \
            "action-pins=${{ needs.action-pins.result }}" \
            "lint=${{ needs.lint.result }}" \
            "typecheck=${{ needs.typecheck.result }}" \
            "unit=${{ needs.unit-summary.result }}" \
            "invariants=${{ needs.invariants.result }}" \
            "bundle=${{ needs.bundle-budget.result }}" \
            "core-bundle=${{ needs.core-bundle-budget.result }}" \
            "e2e=${{ needs.e2e.result }}" \
            "worker-smoke=${{ needs.remote-worker-smoke.result }}"; do
            name=${result%%=*}
            value=${result#*=}
            if [ "$value" != "success" ] && [ "$value" != "skipped" ]; then
              echo "$name failed or was cancelled: $value"
              exit 1
            fi
          done
          echo "PR fast gate passed. Optional heavy jobs may be skipped by design."

  main-green-summary:
    name: Main Green Summary
    if: always() && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [action-pins, lint, typecheck, bundle-budget, core-bundle-budget, unit-summary, invariants, e2e, remote-worker-smoke]
    steps:
      - name: Verify main checks
        run: |
          for result in \
            "action-pins=${{ needs.action-pins.result }}" \
            "lint=${{ needs.lint.result }}" \
            "typecheck=${{ needs.typecheck.result }}" \
            "bundle=${{ needs.bundle-budget.result }}" \
            "core-bundle=${{ needs.core-bundle-budget.result }}" \
            "unit=${{ needs.unit-summary.result }}" \
            "invariants=${{ needs.invariants.result }}" \
            "e2e=${{ needs.e2e.result }}" \
            "worker-smoke=${{ needs.remote-worker-smoke.result }}"; do
            name=${result%%=*}
            value=${result#*=}
            if [ "$value" != "success" ]; then
              echo "$name is not green: $value"
              exit 1
            fi
          done
          echo "Remote main is green."

  publish-ci:
    name: Publish CI packages to npm
    needs: [main-green-summary]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Set unique CI package version
        id: version
        run: node scripts/set-ci-package-version.mjs

      - name: Build publishable packages
        run: |
          pnpm --filter @hachej/boring-ui-kit build
          pnpm --filter @hachej/boring-bash build
          pnpm --filter @hachej/boring-agent build
          pnpm --filter @hachej/boring-ui-plugin-cli build
          pnpm --filter @hachej/boring-workspace build
          pnpm --filter @hachej/boring-core build
          pnpm --filter @hachej/boring-deck build
          pnpm --filter @hachej/boring-diagram build
          pnpm --filter @hachej/boring-ui-cli build:full
          pnpm --filter @hachej/boring-ask-user build
          pnpm --filter @hachej/boring-data-explorer build
          pnpm --filter @hachej/boring-data-catalog build
          pnpm --filter @hachej/boring-generated-pane build
          pnpm --filter @hachej/boring-data-bridge build
          pnpm --filter @hachej/boring-bi-dashboard build
          pnpm --filter @hachej/boring-sandbox build
          pnpm --filter @hachej/boring-governance build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Publish packages with ci dist-tag
        run: |
          for pkg in packages/ui packages/boring-bash packages/agent packages/plugin-cli packages/workspace packages/core packages/cli plugins/deck plugins/diagram plugins/tasks plugins/ask-user plugins/boring-automation plugins/data-explorer plugins/data-catalog plugins/generated-pane plugins/data-bridge plugins/bi-dashboard packages/boring-sandbox plugins/boring-mcp plugins/boring-governance; do
            tarball=$(cd $pkg && pnpm pack 2>&1 | tail -1)
            if ! npm publish "$pkg/$tarball" --access public --tag ci --provenance; then
              echo "::warning::CI package publish failed for $pkg; continuing because release publishing is handled by release.yml"
            fi
          done
