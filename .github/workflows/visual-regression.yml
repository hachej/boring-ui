name: Visual Regression

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches:
      - main

env:
  CI: true

permissions:
  contents: read

concurrency:
  group: visual-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Visual Changes
    runs-on: ubuntu-latest
    outputs:
      visual: ${{ steps.filter.outputs.visual }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Detect changed visual areas
        id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}" || true
            files=$(git diff --name-only "$base...HEAD")
          else
            files=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" || true)
          fi

          visual=false
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              .github/workflows/visual-regression.yml|.storybook/*|.storybook/**|pnpm-lock.yaml|package.json|packages/ui/*|packages/ui/**|packages/workspace/src/front/*|packages/workspace/src/front/**|packages/core/src/front/*|packages/core/src/front/**|packages/core/src/app/front/*|packages/core/src/app/front/**|apps/*/src/front/*|apps/*/src/front/**|plugins/*/src/*.tsx|plugins/*/src/**/*.tsx|**/*.css)
                visual=true
                ;;
            esac
          done <<< "$files"

          echo "visual=$visual" >> "$GITHUB_OUTPUT"

  storybook-visual:
    name: Storybook Visual Baseline
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.visual == 'true' || contains(github.event.pull_request.labels.*.name, 'ci:visual') || contains(github.event.pull_request.labels.*.name, 'ci:full') || contains(github.event.pull_request.labels.*.name, 'release-candidate') || startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run visual regression suite
        run: pnpm visual:storybook

      - name: Upload visual artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-regression-artifacts
          path: |
            playwright-report
            test-results
