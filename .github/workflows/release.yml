name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package versions
        run: |
          tag="${{ github.event.release.tag_name }}"
          expected="${tag#v}"
          actual=$(node -p "require('./packages/cli/package.json').version")
          if [ "$expected" != "$actual" ]; then
            echo "Tag $tag (=> $expected) does not match package version $actual"
            echo "Bump packages with: node scripts/version.mjs <patch|minor|major>"
            exit 1
          fi
          node scripts/version.mjs --check

      - name: Build publishable packages
        run: |
          pnpm -r \
            --filter @hachej/boring-ui-kit \
            --filter @hachej/boring-agent \
            --filter @hachej/boring-workspace \
            --filter @hachej/boring-core \
            --filter @hachej/boring-deck \
            --filter @hachej/boring-ask-user \
            --filter @hachej/boring-data-explorer \
            --filter @hachej/boring-data-catalog \
            --workspace-concurrency=4 \
            run build
          pnpm --filter @hachej/boring-ui-cli build:full

      - name: Audit publish manifests
        run: pnpm audit:publish-manifests

      - name: Publish
        run: |
          for pkg in packages/ui packages/agent packages/workspace packages/core packages/cli plugins/deck plugins/ask-user plugins/data-explorer plugins/data-catalog; do
            name=$(node -p "require('./$pkg/package.json').name")
            version=$(node -p "require('./$pkg/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version already published; skipping"
              continue
            fi
            tarball=$(cd $pkg && pnpm pack 2>&1 | tail -1)
            npm publish "$pkg/$tarball" --access public --provenance
          done
