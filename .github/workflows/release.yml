name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package versions
        run: |
          tag="${{ github.event.release.tag_name }}"
          expected="${tag#v}"
          actual=$(node -p "require('./package.json').version")
          if [ "$expected" != "$actual" ]; then
            echo "Tag $tag (=> $expected) does not match root package version $actual"
            echo "Bump packages with: node scripts/version.mjs <patch|minor|major>"
            exit 1
          fi
          node scripts/version.mjs --check

      - name: Build publishable packages
        run: |
          pnpm -r \
            --filter @hachej/boring-ui-kit \
            --filter @hachej/boring-bash \
            --filter @hachej/boring-agent \
            --filter @hachej/boring-ui-plugin-cli \
            --filter @hachej/boring-workspace \
            --filter @hachej/boring-core \
            --filter @hachej/boring-deck \
            --filter @hachej/boring-ask-user \
            --filter @hachej/boring-diagram \
            --filter @hachej/boring-tasks \
            --filter @hachej/boring-automation \
            --filter @hachej/boring-data-explorer \
            --filter @hachej/boring-data-catalog \
            --filter @hachej/boring-generated-pane \
            --filter @hachej/boring-data-bridge \
            --filter @hachej/boring-bi-dashboard \
            --filter @hachej/boring-sandbox \
            --filter @hachej/boring-mcp \
            --filter @hachej/boring-governance \
            --workspace-concurrency=4 \
            run build
          pnpm --filter @hachej/boring-ui-cli build:full

      - name: Audit publish manifests
        run: pnpm audit:publish-manifests

      - name: Publish
        run: |
          for pkg in packages/ui packages/boring-bash packages/boring-sandbox packages/agent packages/plugin-cli packages/workspace packages/core plugins/deck plugins/ask-user plugins/diagram plugins/tasks plugins/boring-automation packages/cli plugins/data-explorer plugins/data-catalog plugins/generated-pane plugins/data-bridge plugins/bi-dashboard plugins/boring-mcp plugins/boring-governance; do
            name=$(node -p "require('./$pkg/package.json').name")
            version=$(node -p "require('./$pkg/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version already published; skipping"
              continue
            fi
            tarball=$(cd $pkg && pnpm pack 2>&1 | tail -1)
            npm publish "$pkg/$tarball" --access public --provenance
          done

  deploy-full-app:
    name: Deploy full-app to Fly.io
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1

      - name: Deploy boring-full-app
        run: flyctl deploy --remote-only --app boring-full-app --config apps/full-app/fly.toml --build-target runtime
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # boring-macro is deployed from its canonical standalone repository:
      # https://github.com/hachej/boring-macro
      # Do not deploy it from this monorepo.
