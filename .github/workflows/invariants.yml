name: Invariants

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-invariants:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Assert workflow actions are pinned to commit SHAs
        run: bash scripts/check-action-pins.sh

      - name: Setup pnpm
        uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.19.0
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Run invariant checks
        run: pnpm lint:invariants

      - name: Build agent package and assert dist artifacts
        run: pnpm --filter @hachej/boring-agent... --workspace-concurrency=4 run build

      - name: Assert agent has zero runtime imports from core
        run: pnpm check:agent-isolation

      - name: Audit app imports for forbidden patterns
        run: pnpm audit:imports
