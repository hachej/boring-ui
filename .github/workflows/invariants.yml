name: Invariants

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-invariants:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run invariant checks
        run: pnpm lint:invariants

      - name: Build agent package and assert dist artifacts
        run: pnpm --dir packages/agent build

      - name: Assert agent has zero runtime imports from core
        run: pnpm check:agent-isolation

      - name: Audit app imports for forbidden patterns
        run: pnpm audit:imports
