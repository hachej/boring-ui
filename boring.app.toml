# boring.app.toml — Example configuration for boring-ui itself
# Child apps copy this pattern and customize.

[app]
name = "boring-ui"
logo = "B"
id   = "boring-ui"

# ─── Backend ───────────────────────────────────────────────
[backend]
# Canonical backend for boring-ui and child apps.
type  = "python"
entry = "boring_ui.api.app:create_app"
pythonpath = ["src/back"]
port  = 8000
# Additional FastAPI routers (Python dotted paths)
routers = []

[agents]
mode = "frontend"  # browser PI / LightningFS
default = "pi"

[agents.pi]
enabled = true

# ─── Frontend ──────────────────────────────────────────────
[frontend]
port = 5173

[frontend.branding]
name = "Boring UI"

[frontend.features]
agentRailMode = "all"

[frontend.data]
backend = "lightningfs"

# Custom panels: id = { component, title, placement }
[frontend.panels]

# ─── CLI binary (agent-discoverable) ──────────────────────
[cli]
# Child app CLI on PATH. `bui run <args...>` delegates here.
name = "bui"
# Optional legacy aliases can still live under [cli.commands].

# ─── Auth ─────────────────────────────────────────────────
[auth]
provider = "neon"               # supported app configs: "neon" | "local"
session_cookie = "boring_session"
session_ttl = 86400

# ─── Deploy ──────────────────────────────────────────────
[deploy]
platform = "fly"                 # "fly" | "modal" | "docker"
env      = "prod"                # "prod" | "staging" | "dev" — Vault path isolation

[deploy.secrets]
DATABASE_URL              = { vault = "secret/agent/app/boring-ui/prod", field = "database_url" }
BORING_UI_SESSION_SECRET  = { vault = "secret/agent/app/boring-ui/prod", field = "session_secret" }
BORING_SETTINGS_KEY       = { vault = "secret/agent/app/boring-ui/prod", field = "settings_key" }
ANTHROPIC_API_KEY         = { vault = "secret/agent/anthropic", field = "api_key" }
RESEND_API_KEY            = { vault = "secret/agent/services/resend", field = "api_key" }
GITHUB_APP_ID             = { vault = "secret/agent/services/boring-ui-app", field = "app_id" }
GITHUB_APP_CLIENT_ID      = { vault = "secret/agent/services/boring-ui-app", field = "client_id" }
GITHUB_APP_CLIENT_SECRET  = { vault = "secret/agent/services/boring-ui-app", field = "client_secret" }
GITHUB_APP_PRIVATE_KEY    = { vault = "secret/agent/services/boring-ui-app", field = "pem" }
GITHUB_APP_SLUG           = { vault = "secret/agent/services/boring-ui-app", field = "slug" }

[deploy.neon]
project      = "long-glade-16936142"
database     = "neondb"
auth_url     = "https://ep-solitary-darkness-ag6rrvrn.neonauth.c-2.eu-central-1.aws.neon.tech/neondb/auth"
jwks_url     = "https://ep-solitary-darkness-ag6rrvrn.neonauth.c-2.eu-central-1.aws.neon.tech/neondb/auth/.well-known/jwks.json"

[deploy.modal]
app_name = "boring-ui"
min_containers = 0

[deploy.docker]
registry = "ghcr.io/hachej"
compose_file = "deploy/docker-compose.prod.yml"
dockerfile = "deploy/python/Dockerfile"
caddy_file = "deploy/python/Caddyfile.prod"
host = "46.225.19.111.sslip.io"
ssh_key_vault = "secret/agent/hetzner-ssh"
remote_dir = "/opt/boring-ui"
