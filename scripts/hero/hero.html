<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Boring UI hero</title>
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <style>
    :root {
      /* Token mirror — values tracked against packages/workspace/src/globals.css (light theme) */
      --bg:        #FAF7F2;
      --canvas:    #FFFFFF;
      --fg:        #171717;
      --muted:     #525252;
      --hairline:  #E8E1D5;
      --accent:    #C7591A;     /* one accent, used sparingly */
      --mono: ui-monospace, "JetBrains Mono", "SFMono-Regular", Menlo, Consolas, monospace;
      --sans: "Inter", "Inter var", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); }
    body {
      width: 1920px;
      height: 760px;
      font-family: var(--sans);
      color: var(--fg);
      font-feature-settings: "ss01", "cv11", "cv02";
      -webkit-font-smoothing: antialiased;
    }
    .hero {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 600px 1fr;
      gap: 96px;
      padding: 0 96px;
      align-items: center;
    }
    .text {
      padding-top: 8px;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 32px;
    }
    .eyebrow::before {
      content: "";
      display: inline-block;
      width: 24px;
      height: 1px;
      background: var(--accent);
    }
    h1 {
      font-size: 104px;
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 0.95;
      margin: 0 0 28px 0;
    }
    h1 .accent {
      color: var(--fg);
      font-style: italic;
      font-weight: 500;
    }
    p.lede {
      font-size: 26px;
      line-height: 1.35;
      color: var(--muted);
      margin: 0 0 40px 0;
      max-width: 520px;
      font-weight: 400;
    }
    p.lede b {
      color: var(--fg);
      font-weight: 600;
    }
    .cmd {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-family: var(--mono);
      font-size: 16px;
      color: var(--fg);
      background: var(--canvas);
      border: 1px solid var(--hairline);
      padding: 14px 18px;
      border-radius: 10px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.02);
    }
    .cmd .dollar { color: var(--muted); user-select: none; }
    .cmd .pkg { font-weight: 500; }
    .shot-wrap {
      position: relative;
      width: 100%;
      height: 600px;
      display: flex;
      align-items: center;
    }
    .shot {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: left center;
      border-radius: 14px;
      border: 1px solid var(--hairline);
      box-shadow:
        0 1px 0 rgba(0,0,0,0.04),
        0 24px 56px -28px rgba(20, 16, 8, 0.18);
      background: var(--canvas);
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="text">
      <div class="eyebrow">An agent-first workspace</div>
      <h1>Boring UI</h1>
      <p class="lede">
        Bring your agent skills. Get a UI.<br/>
        One chat, one workbench, one sandbox — plugins make it yours.
      </p>
      <div class="cmd">
        <span class="dollar">$</span>
        <span class="pkg">npx&nbsp;@hachej/boring-ui-cli</span>
      </div>
    </div>
    <div class="shot-wrap">
      <img class="shot" src="../../docs/assets/readme/source-hero.png" alt="Boring UI workspace" />
    </div>
  </div>
</body>
</html>
