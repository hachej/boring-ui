<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Boring UI hero</title>
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&display=swap" />
  <style>
    :root {
      /* Token mirror — values tracked against packages/workspace/src/globals.css (light theme) */
      --bg:        #FAF7F2;
      --canvas:    #FFFFFF;
      --fg:        #171717;
      --muted:     #3F3A33;
      --hairline:  #E8E1D5;
      --accent:    #C7591A;
      --ink:       #171717;
      --mono: ui-monospace, "JetBrains Mono", "SFMono-Regular", Menlo, Consolas, monospace;
      --sans: "Inter", "Inter var", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --hand: "Caveat", "Inter", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); }
    body {
      width: 1920px;
      height: 900px;
      font-family: var(--sans);
      color: var(--fg);
      font-feature-settings: "ss01", "cv11", "cv02";
      -webkit-font-smoothing: antialiased;
    }
    .hero {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 540px 1fr;
      gap: 112px;
      padding: 0 96px;
      align-items: center;
    }
    .text { padding-top: 8px; }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      font-size: 19px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 40px;
    }
    .eyebrow::before {
      content: "";
      display: inline-block;
      width: 24px;
      height: 1px;
      background: var(--accent);
    }
    h1 {
      font-size: 100px;
      font-weight: 700;
      letter-spacing: -0.028em;
      line-height: 0.94;
      margin: 0 0 18px 0;
    }
    .subtitle {
      font-size: 46px;
      font-weight: 500;
      letter-spacing: -0.015em;
      line-height: 1.12;
      color: var(--fg);
      margin: 0 0 36px 0;
    }
    p.lede {
      font-size: 30px;
      line-height: 1.4;
      color: var(--muted);
      margin: 0 0 44px 0;
      max-width: 520px;
      font-weight: 400;
    }
    .cmd {
      display: inline-flex;
      align-items: center;
      gap: 18px;
      font-family: var(--mono);
      font-size: 22px;
      color: var(--fg);
      background: var(--canvas);
      border: 1px solid var(--hairline);
      padding: 16px 24px;
      border-radius: 12px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.02);
      max-width: fit-content;
    }
    .cmd .dollar { color: var(--muted); user-select: none; }
    .cmd .pkg { font-weight: 500; }
    .meta-row {
      display: flex;
      gap: 28px;
      margin-top: 32px;
      font-family: var(--mono);
      font-size: 17px;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    /* Right column: framed screenshot + annotations */
    .shot-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .shot {
      width: 88%;
      max-height: 580px;
      height: auto;
      object-fit: contain;
      border-radius: 14px;
      border: 1px solid var(--hairline);
      box-shadow:
        0 1px 0 rgba(0,0,0,0.04),
        0 24px 56px -28px rgba(20, 16, 8, 0.18);
      background: var(--canvas);
      display: block;
      margin-top: 60px;
    }

    .annot {
      position: absolute;
      font-family: var(--sans);
      font-weight: 700;
      font-size: 22px;
      color: var(--ink);
      line-height: 1.2;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      pointer-events: none;
    }
    .annot .sub {
      display: block;
      font-size: 18px;
      font-weight: 500;
      color: #4A463E;
      letter-spacing: 0.03em;
      text-transform: none;
      margin-top: 6px;
    }
    .annot.top-left  { top: 24px; left: 80px;  max-width: 560px; }
    .annot.top-right { top: 24px; right: 60px; max-width: 640px; text-align: right; }

    .arrow {
      position: absolute;
      pointer-events: none;
      overflow: visible;
    }
    .arrow.top-left {
      top: 96px;
      left: 180px;
      width: 280px;
      height: 150px;
    }
    .arrow.top-right {
      top: 96px;
      right: 80px;
      width: 280px;
      height: 150px;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="text">
      <div class="eyebrow">Turning SaaS into agent workspaces</div>
      <h1>Boring UI</h1>
      <p class="subtitle">Give a UI to your agent.</p>
      <div class="cmd">
        <span class="dollar">$</span>
        <span class="pkg">npx&nbsp;@hachej/boring-ui-cli</span>
      </div>
      <div class="meta-row">
        <span>Open&nbsp;source</span><span>·</span><span>Self-host</span><span>·</span><span>MIT</span>
      </div>
    </div>

    <div class="shot-wrap">
      <img class="shot" src="../../docs/assets/readme/source-hero.png" alt="Boring UI workspace" />

      <!-- Both annotations at the top — arrows curve down into their halves of the screenshot -->

      <!-- LEFT: agent + skills → arrow into chat hero -->
      <div class="annot top-left">The agent<span class="sub">with your skills + prompts</span></div>
      <svg class="arrow top-left" viewBox="0 0 280 150" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="ah-tl" viewBox="0 0 10 10" refX="9" refY="5"
                  markerWidth="9" markerHeight="9" orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 Z" fill="#171717" />
          </marker>
        </defs>
        <path d="M30,16 Q110,70 200,134"
              stroke="#171717" stroke-width="2.4" fill="none"
              stroke-linecap="round"
              marker-end="url(#ah-tl)" />
      </svg>

      <!-- RIGHT: workspace the agent controls + builds → arrow into workbench -->
      <div class="annot top-right">The workspace<span class="sub">the agent can control and build as you go</span></div>
      <svg class="arrow top-right" viewBox="0 0 280 150" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="ah-tr" viewBox="0 0 10 10" refX="9" refY="5"
                  markerWidth="9" markerHeight="9" orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 Z" fill="#171717" />
          </marker>
        </defs>
        <path d="M250,16 Q170,70 80,134"
              stroke="#171717" stroke-width="2.4" fill="none"
              stroke-linecap="round"
              marker-end="url(#ah-tr)" />
      </svg>
    </div>
  </div>
</body>
</html>
