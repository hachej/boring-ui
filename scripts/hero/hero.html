<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Boring UI hero</title>
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&display=swap" />
  <style>
    :root {
      /* Token mirror — values tracked against packages/workspace/src/globals.css (light theme) */
      --bg:        #FAF7F2;
      --canvas:    #FFFFFF;
      --fg:        #171717;
      --muted:     #3F3A33;
      --hairline:  #E8E1D5;
      --accent:    #C7591A;
      --ink:       #171717;
      --mono: ui-monospace, "JetBrains Mono", "SFMono-Regular", Menlo, Consolas, monospace;
      --sans: "Inter", "Inter var", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --hand: "Caveat", "Inter", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); }
    body {
      width: 1920px;
      height: 900px;
      font-family: var(--sans);
      color: var(--fg);
      font-feature-settings: "ss01", "cv11", "cv02";
      -webkit-font-smoothing: antialiased;
    }
    .hero {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 540px 1fr;
      gap: 112px;
      padding: 0 96px;
      align-items: center;
    }
    .text { padding-top: 8px; }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 32px;
    }
    .eyebrow::before {
      content: "";
      display: inline-block;
      width: 24px;
      height: 1px;
      background: var(--accent);
    }
    h1 {
      font-size: 100px;
      font-weight: 700;
      letter-spacing: -0.028em;
      line-height: 0.94;
      margin: 0 0 32px 0;
    }
    p.lede {
      font-size: 24px;
      line-height: 1.55;
      color: var(--muted);
      margin: 0 0 40px 0;
      max-width: 480px;
      font-weight: 400;
    }
    .cmd {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-family: var(--mono);
      font-size: 15px;
      color: var(--fg);
      background: var(--canvas);
      border: 1px solid var(--hairline);
      padding: 12px 16px;
      border-radius: 10px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.02);
      max-width: fit-content;
    }
    .cmd .dollar { color: var(--muted); user-select: none; }
    .cmd .pkg { font-weight: 500; }
    .meta-row {
      display: flex;
      gap: 24px;
      margin-top: 28px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    /* Right column: framed screenshot + annotations */
    .shot-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .shot {
      width: 100%;
      max-height: 720px;
      height: auto;
      object-fit: contain;
      border-radius: 14px;
      border: 1px solid var(--hairline);
      box-shadow:
        0 1px 0 rgba(0,0,0,0.04),
        0 24px 56px -28px rgba(20, 16, 8, 0.18);
      background: var(--canvas);
      display: block;
    }

    .annot {
      position: absolute;
      font-family: var(--hand);
      font-weight: 700;
      font-size: 46px;
      color: var(--ink);
      line-height: 0.95;
      letter-spacing: -0.005em;
      pointer-events: none;
    }
    .annot .sub {
      display: block;
      font-size: 38px;
      font-weight: 600;
      color: #4A463E;
      margin-top: 2px;
    }
    .annot.top-left { top: 8px; left: 30px; max-width: 520px; }
    .annot.bottom-right { bottom: 8px; right: 30px; max-width: 560px; text-align: right; }

    .arrow {
      position: absolute;
      pointer-events: none;
      overflow: visible;
    }
    .arrow.top-left {
      top: 100px;
      left: 100px;
      width: 280px;
      height: 150px;
    }
    .arrow.bottom-right {
      bottom: 100px;
      right: 80px;
      width: 280px;
      height: 150px;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="text">
      <div class="eyebrow">An agent-first workspace</div>
      <h1>Boring UI</h1>
      <p class="lede">
        An open-source framework for agent-driven apps.<br/>
        Bring your skills — the workspace builds itself as you go.
      </p>
      <div class="cmd">
        <span class="dollar">$</span>
        <span class="pkg">npx&nbsp;@hachej/boring-ui-cli</span>
      </div>
      <div class="meta-row">
        <span>MIT</span><span>·</span><span>TypeScript</span><span>·</span><span>Workspace&nbsp;+&nbsp;Agent&nbsp;+&nbsp;Plugins</span>
      </div>
    </div>

    <div class="shot-wrap">
      <img class="shot" src="../../docs/assets/readme/source-hero.png" alt="Boring UI workspace" />

      <!-- Top annotation: customizable agent → arrow into chat hero -->
      <div class="annot top-left">A customizable agent<span class="sub">(skills + prompts)</span></div>
      <svg class="arrow top-left" viewBox="0 0 280 170" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="ah-tl" viewBox="0 0 12 12" refX="11" refY="6"
                  markerWidth="9" markerHeight="9" orient="auto-start-reverse">
            <path d="M0,0 L12,6 L0,12 Z" fill="#171717" />
          </marker>
        </defs>
        <path d="M30,12 C60,50 110,96 190,140 Q220,156 244,158"
              stroke="#171717" stroke-width="3.5" fill="none"
              stroke-linecap="round" stroke-linejoin="round"
              marker-end="url(#ah-tl)" />
      </svg>

      <!-- Bottom annotation: workspace agent controls + builds → arrow into workbench -->
      <div class="annot bottom-right">A workspace it controls<span class="sub">and builds as you go</span></div>
      <svg class="arrow bottom-right" viewBox="0 0 280 170" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="ah-br" viewBox="0 0 12 12" refX="11" refY="6"
                  markerWidth="9" markerHeight="9" orient="auto-start-reverse">
            <path d="M0,0 L12,6 L0,12 Z" fill="#171717" />
          </marker>
        </defs>
        <path d="M252,158 C220,120 150,84 80,40 Q48,20 28,16"
              stroke="#171717" stroke-width="3.5" fill="none"
              stroke-linecap="round" stroke-linejoin="round"
              marker-end="url(#ah-br)" />
      </svg>
    </div>
  </div>
</body>
</html>
